<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A7342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5D34;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#sunGradient)" stroke-width="3"/>
  
  <!-- Sun rays (8 main rays) -->
  <g id="rays" stroke="url(#sunGradient)" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="15" x2="100" y2="35" />
    <line x1="141.42" y1="23.58" x2="128.28" y2="36.72" />
    <line x1="170" y1="55" x2="155" y2="65" />
    <line x1="176.42" y1="100" x2="160" y2="100" />
    <line x1="170" y1="145" x2="155" y2="135" />
    <line x1="141.42" y1="176.42" x2="128.28" y2="163.28" />
    <line x1="100" y1="185" x2="100" y2="165" />
    <line x1="58.58" y1="176.42" x2="71.72" y2="163.28" />
    <line x1="30" y1="145" x2="45" y2="135" />
    <line x1="23.58" y1="100" x2="40" y2="100" />
    <line x1="30" y1="55" x2="45" y2="65" />
    <line x1="58.58" y1="23.58" x2="71.72" y2="36.72" />
  </g>
  
  <!-- Inner geometric pattern (Aztec-inspired) -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#sunGradient)" stroke-width="2"/>
  
  <!-- Center stone pattern -->
  <g fill="url(#sunGradient)">
    <!-- Four directional triangles -->
    <polygon points="100,50 110,70 90,70" />
    <polygon points="150,100 130,110 130,90" />
    <polygon points="100,150 90,130 110,130" />
    <polygon points="50,100 70,90 70,110" />
  </g>
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="25" fill="none" stroke="url(#sunGradient)" stroke-width="3"/>
  <circle cx="100" cy="100" r="15" fill="url(#sunGradient)"/>
  
  <!-- Decorative corner elements -->
  <g fill="url(#sunGradient)" opacity="0.6">
    <circle cx="100" cy="80" r="3" />
    <circle cx="120" cy="100" r="3" />
    <circle cx="100" cy="120" r="3" />
    <circle cx="80" cy="100" r="3" />
  </g>
</svg>

